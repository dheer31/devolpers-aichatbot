<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>
<title>Developer AI Assistant</title>

<style>

body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:#0f172a;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.chat-container{
    width:700px;
    height:600px;
    background:#020617;
    border-radius:12px;
    display:flex;
    flex-direction:column;
    box-shadow:0 10px 40px rgba(0,0,0,0.6);
}

/* header */

.header{
    background:#1e293b;
    padding:15px;
    text-align:center;
    font-weight:bold;
    color:white;
    border-top-left-radius:12px;
    border-top-right-radius:12px;
}

/* chat window */

.chat-window{
    flex:1;
    padding:20px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:15px;
}

/* user bubble */

.user-message{
    align-self:flex-end;
    background:#2563eb;
    color:white;
    padding:12px 16px;
    border-radius:12px;
    max-width:60%;
    word-wrap:break-word;
}

/* ai bubble */

.ai-message{
    align-self:flex-start;
    background:#1e293b;
    color:white;
    padding:14px;
    border-radius:12px;
    max-width:70%;
    word-wrap:break-word;
}

/* code formatting */

.ai-message pre{
    margin:0;
    white-space:pre-wrap;
    word-wrap:break-word;
    font-family:monospace;
    line-height:1.5;
    background:#020617;
    padding:12px;
    border-radius:8px;
    border:1px solid #334155;
}

/* input area */

.input-area{
    padding:15px;
    background:#1e293b;
    display:flex;
    gap:10px;
    border-bottom-left-radius:12px;
    border-bottom-right-radius:12px;
}

input{
    flex:1;
    padding:12px;
    border:none;
    border-radius:8px;
    outline:none;
    font-size:14px;
}

button{
    background:#22c55e;
    color:white;
    border:none;
    padding:12px 18px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#16a34a;
}

</style>

</head>

<body>

<div class="chat-container">

<div class="header">
🤖 Developer AI Assistant
</div>

<div class="chat-window">

<!-- User Message -->

<div class="user-message" th:if="${message}" th:text="${message}"></div>

<!-- AI Response -->

<div class="ai-message" th:if="${reply}">
<pre th:text="${reply}"></pre>
</div>

</div>

<form action="/chat" method="post" class="input-area">

<input type="text" name="message" placeholder="Ask a coding question..." required>

<button type="submit">Send</button>

</form>

</div>

</body>

</html>
