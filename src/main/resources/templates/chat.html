<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>ChatGPT Clone</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root {
            --bg-color: #212121;
            --sidebar-bg: #171717;
            --text-primary: #ececec;
            --input-bg: #2f2f2f;
            --user-msg-bg: #2f2f2f;
            --btn-color: #ffffff;
            --border-color: #ffffff1a;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            padding: 10px;
            box-sizing: border-box;
            flex-shrink: 0;
        }

        .new-chat-btn {
            background: transparent;
            color: var(--text-primary);
            border: none;
            padding: 12px;
            border-radius: 8px;
            text-align: left;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.2s;
        }

        .new-chat-btn:hover {
            background: #ffffff1a;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            background-color: var(--bg-color);
            height: 100vh;
        }

        /* Header */
        .header {
            padding: 15px 20px;
            font-size: 16px;
            font-weight: 500;
            display: flex;
            align-items: center;
            color: #b4b4b4;
            height: 60px;
            box-sizing: border-box;
        }

        /* Chat Window */
        .chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 20px 0 120px 0;
            /* extra padding for bottom input */
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .chat-row {
            padding: 0 40px;
            display: flex;
            justify-content: center;
        }

        .message-content {
            max-width: 768px;
            width: 100%;
            display: flex;
            gap: 20px;
            font-size: 16px;
            line-height: 1.6;
        }

        .chat-row.user .message-content {
            justify-content: flex-end;
        }

        .chat-row.user .message-text {
            flex: initial;
            background-color: var(--user-msg-bg);
            padding: 12px 20px;
            border-radius: 20px;
            max-width: 75%;
            word-wrap: break-word;
        }

        .chat-row.ai .message-text {
            flex: 1;
            min-width: 0;
            /* ensures pre wraps */
            padding-top: 4px;
            /* Align slightly with the avatar */
        }

        .chat-row.user .avatar {
            display: none;
        }

        .avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .avatar.ai {
            background-color: #10a37f;
            color: white;
            padding: 2px;
            box-sizing: border-box;
        }

        .message-text pre {
            background: #0d0d0d;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            font-family: monospace;
            font-size: 14px;
            margin: 0;
            border: 1px solid var(--border-color);
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        /* Input Area */
        .input-container {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: linear-gradient(180deg, rgba(33, 33, 33, 0) 0%, rgba(33, 33, 33, 1) 40%);
        }

        .input-box {
            max-width: 768px;
            width: 100%;
            position: relative;
            background-color: var(--input-bg);
            border-radius: 24px;
            padding: 10px 14px;
            display: flex;
            align-items: center;
            box-sizing: border-box;
        }

        .input-box input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 16px;
            padding: 8px 12px;
            outline: none;
            min-width: 0;
        }

        .input-box input::placeholder {
            color: #9b9b9b;
        }

        .input-box button {
            background-color: var(--text-primary);
            color: var(--bg-color);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: opacity 0.2s;
            flex-shrink: 0;
            margin-left: 8px;
        }

        .input-box button:hover {
            opacity: 0.8;
            background-color: #d1d5db;
        }

        .disclaimer {
            font-size: 12px;
            color: #9b9b9b;
            margin-top: 10px;
            text-align: center;
            margin-bottom: 5px;
        }

        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }

            .chat-row {
                padding: 0 20px;
            }
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <button class="new-chat-btn" onclick="window.location.href='/'">
            <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round"
                stroke-linejoin="round" height="1.2em" width="1.2em" xmlns="http://www.w3.org/2000/svg">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
            New chat
        </button>
    </div>

    <div class="main-content">
        <div class="header">
            Developer AI Assistant
        </div>

        <div class="chat-window">

            <!-- User Message -->
            <div class="chat-row user" th:if="${message}">
                <div class="message-content">
                    <div class="message-text" th:text="${message}"></div>
                </div>
            </div>

            <!-- AI Response -->
            <div class="chat-row ai" th:if="${reply}">
                <div class="message-content">
                    <div class="avatar ai">
                        <!-- Bot Icon -->
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2ZM12 4C16.4183 4 20 7.58172 20 12C20 16.4183 16.4183 20 12 20C7.58172 20 4 16.4183 4 12C4 7.58172 7.58172 4 12 4Z"
                                fill="white" />
                            <path
                                d="M12 6C8.68629 6 6 8.68629 6 12C6 15.3137 8.68629 18 12 18C15.3137 18 18 15.3137 18 12C18 8.68629 15.3137 6 12 6ZM12 8C14.2091 8 16 9.79086 16 12C16 14.2091 14.2091 16 12 16C9.79086 16 8 14.2091 8 12C8 9.79086 9.79086 8 12 8Z"
                                fill="white" />
                        </svg>
                    </div>
                    <div class="message-text">
                        <pre th:text="${reply}"></pre>
                    </div>
                </div>
            </div>

        </div>

        <div class="input-container">
            <form action="/chat" method="post" class="input-box">
                <input type="text" name="message" placeholder="Message Developer AI Assistant..." required
                    autocomplete="off" autofocus>
                <button type="submit">
                    <!-- Up Arrow Icon -->
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 5V19M12 5L6 11M12 5L18 11" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                </button>
            </form>
            <div class="disclaimer">
                Developer AI Assistant can make mistakes. Check important info.
            </div>
        </div>
    </div>

    <!-- Scroll to bottom script -->
    <script>
        const chatWindow = document.querySelector('.chat-window');
        if (chatWindow) {
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }
    </script>
</body>

</html>
